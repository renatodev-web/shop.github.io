<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaShop</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* RESET */
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

/* NAVBAR */
.navbar { background:#111; }

.search-box input {
  border-radius:20px;
}

/* HERO */
.hero {
  background: url('https://png.pngtree.com/png-vector/20210702/ourlarge/pngtree-red-sale-offer-discount-banner-also-for-grand-opening-promo-png-image_3545129.jpg') center/cover;
  height: 50vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  position:relative;
}

.hero::before {
  content:"";
  position:absolute;
  inset:0;
  background: rgba(0,0,0,0.6);
}

.hero h1 {
  position:relative;
  z-index:1;
  font-size:40px;
}

/* PRODUCTO */
.producto {
  background:white;
  border-radius:10px;
  overflow:hidden;
  transition:0.3s;
}

.producto:hover {
  transform:translateY(-5px);
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

/* IMAGEN UNIFICADA */
.img-box {
  position:relative;
  width:100%;
  height:250px; /* 👈 clave */
  overflow:hidden;
}

.img-box img {
  width:100%;
  height:100%;
  object-fit:cover; /* 👈 uniformiza todo */
  transition:0.5s;
}

.producto:hover img {
  transform:scale(1.1);
}

/* BADGE */
.badge-custom {
  position:absolute;
  top:10px;
  left:10px;
  background:crimson;
  color:white;
  padding:5px 10px;
  font-size:12px;
}

/* OVERLAY */
.overlay {
  position:absolute;
  inset:0;
  background: rgba(0,0,0,0.6);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  opacity:0;
  transition:0.3s;
}

.img-box:hover .overlay {
  opacity:1;
}

.overlay button {
  background:white;
  border:none;
  padding:8px 12px;
  font-size:13px;
}

.overlay button:hover {
  background:black;
  color:white;
}

/* INFO */
.info {
  padding:15px;
  text-align:center;
}

.precio {
  color:crimson;
  font-weight:bold;
  font-size:18px;
}

/* FOOTER */
footer {
  background:#111;
  color:white;
  padding:30px 0;
}

/* RESPONSIVE PRO */
@media (max-width: 992px) {
  .hero { height:40vh; }
}

@media (max-width: 768px) {
  .hero h1 { font-size:24px; }

  .search-box {
    display:none; /* ocultar buscador en móvil */
  }

  .img-box {
    height:180px; /* imágenes más pequeñas en móvil */
  }
}

@media (max-width: 480px) {
  .img-box {
    height:150px;
  }

  .overlay button {
    font-size:11px;
    padding:6px 8px;
  }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <span class="navbar-brand">NovaShop</span>

    <div class="search-box w-50">
      <input class="form-control" placeholder="Buscar productos...">
    </div>

    <div class="text-white">🛒</div>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Ofertas exclusivas hoy</h1>
</section>

<!-- PRODUCTOS -->
<div class="container my-5">
  <h3 class="mb-4">Productos destacados</h3>

  <div class="row g-4">

    <!-- PRODUCTO -->
    <div class="col-lg-3 col-md-6 col-6">
      <div class="producto">
        <div class="img-box">
          <span class="badge-custom">Oferta</span>
          <img src="https://claroperupoc.vtexassets.com/arquivos/ids/2396944/image-118a9ed097374031aaf48f24247223ec.jpg">
          <div class="overlay">
            <button>Ver</button>
            <button>Añadir</button>
          </div>
        </div>
        <div class="info">
          <h6>Audífonos Bluetooth</h6>
          <p class="precio">S/ 129</p>
        </div>
      </div>
    </div>

    <!-- PRODUCTO -->
    <div class="col-lg-3 col-md-6 col-6">
      <div class="producto">
        <div class="img-box">
          <span class="badge-custom">Nuevo</span>
          <img src="https://media.istockphoto.com/id/2222320816/es/foto/zapatillas-deportivas-para-correr-aisladas-sobre-fondo-blanco.jpg?s=612x612&w=0&k=20&c=DsLltrKUnfXMO2SaxwDNIGls_zVGHOMPm8G3kZ11ngw=">
          <div class="overlay">
            <button>Ver</button>
            <button>Añadir</button>
          </div>
        </div>
        <div class="info">
          <h6>Zapatillas deportivas</h6>
          <p class="precio">S/ 219</p>
        </div>
      </div>
    </div>

    <!-- PRODUCTO -->
    <div class="col-lg-3 col-md-6 col-6">
      <div class="producto">
        <div class="img-box">
          <img src="https://img.freepik.com/fotos-premium/exhibicion-digital-pulsera-reloj-inteligente-negra-fondo-blanco_665346-55392.jpg">
          <div class="overlay">
            <button>Ver</button>
            <button>Añadir</button>
          </div>
        </div>
        <div class="info">
          <h6>Smartwatch</h6>
          <p class="precio">S/ 349</p>
        </div>
      </div>
    </div>

    <!-- PRODUCTO -->
    <div class="col-lg-3 col-md-6 col-6">
      <div class="producto">
        <div class="img-box">
          <img src="https://www.thenorthface.com.pe/media/catalog/product/n/f/nf0a8bk4_nfbia_1_1.jpg">
          <div class="overlay">
            <button>Ver</button>
            <button>Añadir</button>
          </div>
        </div>
        <div class="info">
          <h6>Mochila urbana</h6>
          <p class="precio">S/ 179</p>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- FOOTER -->
<footer>
  <div class="container text-center">
    © 2026 NovaShop
  </div>
</footer>

</body>
</html>
